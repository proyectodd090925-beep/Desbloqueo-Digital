<script type="module">
/* ─── FIREBASE INIT ─── */
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,setDoc,onSnapshot,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const fbConfig={
  apiKey:"AIzaSyBZZc4-4xyHS-l63z93teCZoC3FNYaOaN0",
  authDomain:"proyecto-dd-a79e9.firebaseapp.com",
  projectId:"proyecto-dd-a79e9",
  storageBucket:"proyecto-dd-a79e9.firebasestorage.app",
  messagingSenderId:"402979073461",
  appId:"1:402979073461:web:569a98542d5d32a876bdfc"
};
const fbApp=initializeApp(fbConfig);
const db=getFirestore(fbApp);
const DOC_ID='academia-main';

window._fb={
  db,
  docRef:()=>doc(db,'academia',DOC_ID),
  save:async(data)=>{
    try{
      // Split into chunks to avoid Firestore 1MB limit (images are big)
      const {branding,...rest}=data;
      const brandingNoLogo={...branding,logo:branding?.logo||null};
      await setDoc(doc(db,'academia',DOC_ID),{...rest,branding:brandingNoLogo,_ts:Date.now()},{merge:true});
      // Save logo separately if it exists
      if(branding?.logo){
        await setDoc(doc(db,'academia',DOC_ID+'-logo'),{logo:branding.logo,_ts:Date.now()});
      }
      return true;
    }catch(e){console.warn('Firebase save error:',e);return false;}
  },
  load:async()=>{
    try{
      const snap=await getDoc(doc(db,'academia',DOC_ID));
      const logoSnap=await getDoc(doc(db,'academia',DOC_ID+'-logo'));
      if(!snap.exists())return null;
      const data=snap.data();
      if(logoSnap.exists()&&logoSnap.data().logo){
        data.branding={...data.branding,logo:logoSnap.data().logo};
      }
      return data;
    }catch(e){console.warn('Firebase load error:',e);return null;}
  },
  listen:(callback)=>{
    const unsub=onSnapshot(doc(db,'academia',DOC_ID),(snap)=>{
      if(snap.exists()){
        const data=snap.data();
        // Also get logo
        getDoc(doc(db,'academia',DOC_ID+'-logo')).then(logoSnap=>{
          if(logoSnap.exists()&&logoSnap.data().logo){
            data.branding={...data.branding,logo:logoSnap.data().logo};
          }
          callback(data);
        }).catch(()=>callback(data));
      }
    });
    return unsub;
  }
};
window._fbReady=true;
window.dispatchEvent(new Event('fbReady'));
</script>
<style>

body{font-family:var(--font-body);background:var(--bg-app);color:var(--txt);overflow:hidden;}

.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;color:var(--txt-sub);transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{background:var(--bg-input);color:var(--txt);}
.nav-item.active{background:var(--bg-input);color:var(--txt);border-left-color:var(--accent);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);}
.save-indicator{font-size:11px;text-align:center;padding:6px;border-radius:6px;margin-bottom:8px;font-weight:600;}

.cards-row.cols-4{grid-template-columns:repeat(4,1fr);}

.card-value{font-size:26px;font-weight:700;color:var(--txt);}
.card-sub{font-size:11px;color:var(--txt-sub);margin-top:4px;}

.table-wrap{overflow-x:auto;}

th{background:var(--bg-input);color:var(--txt-sub);padding:10px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}

/* ─── MOBILE NAV ─── */

.mobile-bottom-nav-inner{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.mobile-bottom-nav-inner::-webkit-scrollbar{display:none;}
.mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;cursor:pointer;flex-shrink:0;min-width:56px;color:var(--txt-sub);transition:color .15s;border-top:2px solid transparent;}
.mobile-nav-item.active{color:var(--accent);border-top-color:var(--accent);}
.mobile-nav-icon{font-size:20px;}
.mobile-nav-label{font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;}

/* ─── RESPONSIVE ─── */
@media(max-width:768px){
  body{overflow:auto;}
  .app{flex-direction:column;height:100vh;overflow:hidden;}
  .sidebar{display:none;}
  .main{flex:1;overflow-y:auto;padding-bottom:70px;}
  .mobile-header{display:flex;}
  .mobile-bottom-nav{display:block;}
  .view{padding:16px;}
  .cards-row.cols-4{grid-template-columns:repeat(2,1fr);}
  .cards-row.cols-3{grid-template-columns:repeat(2,1fr);}
  .cards-row.cols-2{grid-template-columns:1fr;}
  .form-row.cols-2{grid-template-columns:1fr;}
  .form-row.cols-3{grid-template-columns:1fr;}
  .countdown{grid-template-columns:repeat(4,1fr);gap:8px;}
  .count-num{font-size:24px;}
  .modal{padding:16px;border-radius:12px;}
  table{font-size:12px;}
  th,td{padding:8px;}
  .tabs{flex-wrap:wrap;}
  .tab{flex:none;font-size:11px;padding:6px 10px;}
  .view-title{font-size:18px;}
}
</style>
</head>

const COLOR_NAMES={red:'Rojo',blue:'Azul',purple:'Morado',pink:'Rosa',green:'Verde',orange:'Naranja',black:'Negro',teal:'Teal'};

function applyTheme(themeKey){
  const t=THEMES[themeKey]||THEMES['oscuro-rojo'];
  const r=document.documentElement;
  r.style.setProperty('--accent',t.accent);
  r.style.setProperty('--accentH',t.accentH);
  r.style.setProperty('--bg-app',t.bgApp);
  r.style.setProperty('--bg-card',t.bgCard);

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});}catch{return d;}}
function fmtCur(n){return'$'+Number(n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});}

/* ─── STORAGE ─── */
const KEY='academia_v2';
function load(){try{const s=localStorage.getItem(KEY);return s?{...DEFAULT,...JSON.parse(s)}:DEFAULT;}catch{return DEFAULT;}}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));return true;}catch{return false;}}

/* ─── COMPRESS IMAGE ─── */
function compressImage(file,maxPx=200,q=0.75){
  return new Promise(res=>{
    const rd=new FileReader();
    rd.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const ratio=Math.min(maxPx/img.width,maxPx/img.height,1);
        const c=document.createElement('canvas');
        c.width=img.width*ratio;c.height=img.height*ratio;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',q));
      };
      img.src=e.target.result;
    };
    rd.readAsDataURL(file);
  });
}

/* ─── COMPONENTS ─── */
function Badge({status}){
  const map={
    'Pendiente':'badge-pending','En Progreso':'badge-progress','Completado':'badge-done','Pausado':'badge-paused',
    'Alta':'badge-high','Media':'badge-med','Baja':'badge-low',
    'Ingreso':'badge-income','Gasto':'badge-expense',
  };
  return <span className={`badge ${map[status]||'badge-pending'}`}>{status}</span>;
}

function OwnerSelect({value,onChange,profiles}){
  const p1=profiles?.p1?.name||'Persona 1';
  const p2=profiles?.p2?.name||'Persona 2';
  return(
    <select value={value} onChange={e=>onChange(e.target.value)}>
      <option value="">— Seleccionar —</option>
      <option value={p1}>{p1}</option>
      <option value={p2}>{p2}</option>
      <option value="Ambos">Ambos</option>
    </select>
  );
}

function Modal({title,onClose,children,footer}){
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">{title}</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {children}
        {footer&&<div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

/* ─── DASHBOARD ─── */
function DashboardView({data,upd}){
  const totalModules=data.modules.length;
  const doneModules=data.modules.filter(m=>m.status==='Completado').length;
  const totalFinances=data.finances.reduce((a,f)=>f.type==='Ingreso'?a+Number(f.amount):a-Number(f.amount),0);
  const pendingIdeas=data.ideas.filter(i=>i.status==='Pendiente').length;
  const totalContent=data.parrilla.length;
  const doneContent=data.parrilla.filter(p=>p.status==='Publicado').length;

  const launchDate=data.config.launchDate?new Date(data.config.launchDate):null;
  const now=new Date();
  let days=0,hours=0,minutes=0,seconds=0;
  const [tick,setTick]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setTick(x=>x+1),1000);return()=>clearInterval(t);},[]);
  if(launchDate&&launchDate>now){
    const diff=launchDate-new Date();
    days=Math.floor(diff/86400000);
    hours=Math.floor((diff%86400000)/3600000);
    minutes=Math.floor((diff%3600000)/60000);
    seconds=Math.floor((diff%60000)/1000);
  }

  const p1=data.profiles?.p1?.name||'Socio 1';
  const p2=data.profiles?.p2?.name||'Socio 2';
  const logo=data.branding?.logo;

  return(
    <div className="view">
      <div className="view-header">
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          {logo&&<img src={logo} style={{width:48,height:48,borderRadius:10,objectFit:'cover'}} alt="logo"/>}
          <div>
            <div className="view-title">🎓 {data.config.academyName}</div>
            <div className="view-subtitle">Panel de control • {data.config.projectStatus} • Hola {p1} y {p2} 👋</div>
          </div>
        </div>
      </div>

      {data.config.launchDate&&(
        <div className="panel" style={{marginBottom:20}}>
          <div className="section-title">⏳ Cuenta regresiva al lanzamiento</div>
          <div className="countdown">
            {[{n:days,l:'Días'},{n:hours,l:'Horas'},{n:minutes,l:'Min'},{n:seconds,l:'Seg'}].map(x=>(
              <div key={x.l} className="count-box">
                <div className="count-num">{String(x.n).padStart(2,'0')}</div>
                <div className="count-label">{x.l}</div>
              </div>
            ))}
          </div>
          <div className="progress-bar">
            <div className="progress-fill" style={{width:`${Math.round(doneModules/Math.max(totalModules,1)*100)}%`}}/>
          </div>
          <div style={{fontSize:12,color:'var(--txt-sub)',marginTop:6}}>
            {Math.round(doneModules/Math.max(totalModules,1)*100)}% del curso completado
          </div>
        </div>
      )}

      <div className="cards-row cols-4">
        <div className="card"><div className="card-title">📚 Módulos</div><div className="card-value">{doneModules}/{totalModules}</div><div className="card-sub">completados</div></div>
        <div className="card"><div className="card-title">💰 Balance</div><div className="card-value" style={{fontSize:18,color:totalFinances>=0?'#50c050':'#e06060'}}>{fmtCur(totalFinances)}</div><div className="card-sub">saldo actual</div></div>
        <div className="card"><div className="card-title">📱 Contenido</div><div className="card-value">{doneContent}/{totalContent}</div><div className="card-sub">publicados</div></div>
        <div className="card"><div className="card-title">💡 Ideas</div><div className="card-value">{pendingIdeas}</div><div className="card-sub">pendientes</div></div>
      </div>

      <div className="cards-row cols-2">
        <div className="panel">
          <div className="section-title">🎯 Objetivos</div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:12,color:'var(--txt-sub)',marginBottom:4}}>OBJETIVO PRINCIPAL</div>
            <div style={{fontSize:14}}>{data.config.goal1||'—'}</div>
          </div>
          <div>
            <div style={{fontSize:12,color:'var(--txt-sub)',marginBottom:4}}>OBJETIVO SECUNDARIO</div>
            <div style={{fontSize:14}}>{data.config.goal2||'—'}</div>
          </div>
        </div>
        <div className="panel">
          <div className="section-title">📋 Últimos cambios</div>
          {data.changes.slice(-4).reverse().map(c=>(
            <div key={c.id} style={{fontSize:12,padding:'6px 0',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',gap:8}}>
              <span style={{color:'var(--txt)'}}>{c.description}</span>

            </div>

          {!data.changes.length&&<div style={{color:'var(--txt-muted)',fontSize:13}}>Sin cambios aún</div>}
        </div>
      </div>

      <div className="panel">
        <div className="section-title">🗓 Hitos del proyecto</div>
        <div style={{display:'grid',gap:8}}>
          {data.milestones.map((m,i)=>(
            <div key={m.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
              <input type="checkbox" checked={m.done} onChange={e=>{

            </div>

  );

/* ─── TEMPORIZADOR ─── */
function TemporizadorView({data,upd}){
  const {config,milestones}=data;
  const [now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  const launchDate=config.launchDate?new Date(config.launchDate):null;
  const diff=launchDate&&launchDate>now?launchDate-now:0;
  const days=Math.floor(diff/86400000);
  const hours=Math.floor((diff%86400000)/3600000);
  const minutes=Math.floor((diff%3600000)/60000);
  const seconds=Math.floor((diff%60000)/1000);
  const total=launchDate?Math.max(launchDate-new Date(config.launchDate||now).setMonth(new Date().getMonth()-3),1):1;
  const elapsed=launchDate?Math.max(0,now-new Date(new Date(config.launchDate||now).setMonth(new Date().getMonth()-3))):0;
  const pct=Math.min(100,Math.round(elapsed/total*100));

  return(
    <div className="view">
      <div className="view-header">
        <div className="view-title">⏳ Temporizador de Lanzamiento</div>
        <div className="view-subtitle">Fecha objetivo: {config.launchDate?fmtDate(config.launchDate):'No configurada'}</div>
      </div>
      {!config.launchDate&&(
        <div className="panel"><div className="empty-state"><div style={{fontSize:40}}>📅</div><p>Configura la fecha de lanzamiento en Ajustes → Config. General</p></div></div>
      )}
      {config.launchDate&&(
        <>
          {diff>0?(
            <div className="panel">
              <div className="section-title">🚀 Faltan...</div>
              <div className="countdown">
                {[{n:days,l:'Días'},{n:hours,l:'Horas'},{n:minutes,l:'Min'},{n:seconds,l:'Seg'}].map(x=>(
                  <div key={x.l} className="count-box">
                    <div className="count-num">{String(x.n).padStart(2,'0')}</div>
                    <div className="count-label">{x.l}</div>
                  </div>
                ))}
              </div>
            </div>
          ):(
            <div className="panel" style={{textAlign:'center',padding:40}}>
              <div style={{fontSize:60}}>🎉</div>
              <div style={{fontSize:24,fontWeight:700,marginTop:16,color:'var(--accent)'}}>¡FECHA DE LANZAMIENTO ALCANZADA!</div>
            </div>
          )}
          <div className="panel">
            <div className="section-title">🗓 Hitos del Proyecto</div>
            {milestones.map((m,i)=>(
              <div key={m.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{width:20,height:20,borderRadius:'50%',background:m.done?'var(--accent)':'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:11}}>
                  {m.done?'✓':''}
                </div>
                <span style={{flex:1,fontSize:14,textDecoration:m.done?'line-through':'none',color:m.done?'var(--txt-muted)':'var(--txt)'}}>{m.title}</span>
                <span style={{fontSize:12,color:'var(--txt-sub)'}}>{m.date?fmtDate(m.date):'—'}</span>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

        {[['perfiles','👤 Perfiles'],['config','🏫 Config. General'],['apariencia','🎨 Apariencia']].map(([k,l])=>(
          <button key={k} className={`tab ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>

      {tab==='perfiles'&&(
        <div>
          {[['p1','p1Ref'],['p2','p2Ref']].map(([key],ki)=>{
            const person=pr[key];
            const ref=ki===0?p1Ref:p2Ref;
            return(
              <div key={key} className="panel" style={{marginBottom:16}}>
                <div className="section-title">{ki===0?'👤 Perfil 1':'👤 Perfil 2'}</div>
                <div className="profile-card">
                  <div onClick={()=>ref.current.click()} style={{cursor:'pointer',position:'relative'}}>
                    <div className="avatar">
                      {person.photo?<img src={person.photo} alt="foto"/>:<span>🙂</span>}
                    </div>
                    <div style={{fontSize:10,textAlign:'center',marginTop:4,color:'var(--accent)'}}>cambiar foto</div>
                  </div>
                  <input ref={ref} type="file" accept="image/*" style={{display:'none'}} onChange={e=>handlePhoto(key,e)}/>
                  <div style={{flex:1,display:'grid',gap:10}}>
                    <div className="form-row cols-2">
                      <div className="form-group">
                        <label className="form-label">Nombre</label>
                        <input value={person.name} onChange={e=>upd('profiles',{...pr,[key]:{...person,name:e.target.value}},'Nombre actualizado')} placeholder="Tu nombre real"/>
                      </div>
                      <div className="form-group">
                        <label className="form-label">Rol</label>
                        <input value={person.role} onChange={e=>upd('profiles',{...pr,[key]:{...person,role:e.target.value}},'Rol actualizado')} placeholder="Co-Director/a"/>
                      </div>
                    </div>
                  </div>
                </div>
                {person.photo&&<button className="btn btn-danger btn-sm" onClick={()=>upd('profiles',{...pr,[key]:{...person,photo:null}},'Foto eliminada')}>🗑 Quitar foto</button>}
              </div>
            );
          })}
        </div>
      )}

      {tab==='config'&&(
        <div className="panel">
          <div className="section-title">🏫 Configuración General</div>
          <div className="form-row cols-2" style={{marginBottom:14}}>
            <div className="form-group"><label className="form-label">Nombre de la Academia</label><input value={cfg.academyName} onChange={e=>upd('config',{...cfg,academyName:e.target.value},'Nombre academia actualizado')}/></div>
            <div className="form-group"><label className="form-label">Nicho / Temática</label><input value={cfg.niche} onChange={e=>upd('config',{...cfg,niche:e.target.value},'Nicho actualizado')} placeholder="Ej: Marketing digital, Cocina, Fitness..."/></div>
          </div>
          <div className="form-row cols-3" style={{marginBottom:14}}>
            <div className="form-group"><label className="form-label">Precio del curso</label><input value={cfg.price} onChange={e=>upd('config',{...cfg,price:e.target.value},'Precio actualizado')} placeholder="$97"/></div>
            <div className="form-group"><label className="form-label">Fecha de lanzamiento</label><input type="date" value={cfg.launchDate} onChange={e=>upd('config',{...cfg,launchDate:e.target.value},'Fecha lanzamiento actualizada')}/></div>
            <div className="form-group"><label className="form-label">Estado del proyecto</label>
              <select value={cfg.projectStatus} onChange={e=>upd('config',{...cfg,projectStatus:e.target.value},'Estado proyecto actualizado')}>
                {['EN CONSTRUCCIÓN','EN LANZAMIENTO','ACTIVO','PAUSADO'].map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
          </div>
          <div className="form-row cols-2" style={{marginBottom:14}}>
            <div className="form-group"><label className="form-label">Objetivo principal</label><input value={cfg.goal1} onChange={e=>upd('config',{...cfg,goal1:e.target.value})} placeholder="Tu meta más importante"/></div>
            <div className="form-group"><label className="form-label">Objetivo secundario</label><input value={cfg.goal2} onChange={e=>upd('config',{...cfg,goal2:e.target.value})} placeholder="Meta de apoyo"/></div>
          </div>
          <div className="form-row cols-2" style={{marginBottom:14}}>
            <div className="form-group"><label className="form-label">Estudiantes meta</label><input type="number" value={cfg.targetStudents} onChange={e=>upd('config',{...cfg,targetStudents:e.target.value})} placeholder="100"/></div>
          </div>
          <div className="form-group"><label className="form-label">Notas generales</label><textarea value={cfg.notes} onChange={e=>upd('config',{...cfg,notes:e.target.value})} placeholder="Cualquier nota importante sobre el proyecto..."/></div>
        </div>
      )}

      {tab==='apariencia'&&(
        <div>
          <div className="panel">
            <div className="section-title">🎨 Tema de la aplicación</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              {Object.entries(THEMES).map(([key,t])=>{
                const active=(th.key||'oscuro-rojo')===key;
                return(
                  <div key={key} onClick={()=>{
                    const next={...th,key};
                    upd('theme',next,'Tema cambiado: '+t.label);
                    applyTheme(key);
                    setThemeState(next);
                  }} style={{cursor:'pointer',border:`2px solid ${active?'var(--accent)':'var(--border)'}`,borderRadius:14,overflow:'hidden',transition:'all .2s',transform:active?'scale(1.02)':'scale(1)',boxShadow:active?'0 0 0 4px var(--accent)22':'none'}}>
                    {/* mini preview */}
                    <div style={{height:70,background:t.bgApp,display:'flex',alignItems:'stretch',position:'relative',overflow:'hidden'}}>
                      {/* sidebar strip */}
                      <div style={{width:36,background:t.sidebar,borderRight:`1px solid ${t.border}`,display:'flex',flexDirection:'column',gap:6,padding:8}}>
                        {[1,2,3].map(i=><div key={i} style={{height:6,borderRadius:3,background:i===1?t.accent:t.border,opacity:i===1?1:0.5}}/>)}
                      </div>
                      {/* content area */}
                      <div style={{flex:1,padding:8,display:'flex',flexDirection:'column',gap:6}}>
                        <div style={{height:8,borderRadius:4,background:t.accent,width:'60%'}}/>
                        <div style={{display:'flex',gap:4,flex:1}}>
                          {[1,2,3].map(i=><div key={i} style={{flex:1,background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:6}}/>)}
                        </div>
                      </div>
                    </div>
                    {/* label */}
                    <div style={{background:t.bgCard,padding:'8px 12px',display:'flex',alignItems:'center',justifyContent:'space-between',borderTop:`1px solid ${t.border}`}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:t.txt}}>{t.emoji} {t.label}</div>
                        <div style={{fontSize:11,color:t.txtSub,marginTop:2}}>{t.mode==='dark'?'🌙 Oscuro':'☀️ Claro'}</div>
                      </div>
                      {active&&<div style={{width:20,height:20,borderRadius:'50%',background:t.accent,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff'}}>✓</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

/* ─── APP PRINCIPAL ─── */
function App(){
  const [data,setData]=useState(()=>load());
  const [view,setView]=useState('dashboard');
  const [saved,setSaved]=useState(true);
  const [syncStatus,setSyncStatus]=useState('local'); // local | syncing | synced | error
  const [themeState,setThemeState]=useState(()=>data.theme||{key:'oscuro-rojo'});
  const lastSaveTs=useRef(0);
  const isRemoteUpdate=useRef(false);

  useEffect(()=>{applyTheme(themeState.key||'oscuro-rojo');},[]);

  // ── Firebase real-time listener ──
  useEffect(()=>{
    const init=async()=>{
      if(!window._fb)return;
      setSyncStatus('syncing');
      // Load initial data from Firebase
      const remoteData=await window._fb.load();
      if(remoteData){
        const merged={...DEFAULT,...remoteData};
        isRemoteUpdate.current=true;
        setData(merged);
        save(merged);
        if(merged.theme?.key) applyTheme(merged.theme.key);
        setThemeState(merged.theme||{key:'oscuro-rojo'});
      }
      setSyncStatus('synced');
      // Subscribe to real-time changes
      const unsub=window._fb.listen((remoteData)=>{
        if(Date.now()-lastSaveTs.current<2000)return; // skip if we just saved
        const merged={...DEFAULT,...remoteData};
        isRemoteUpdate.current=true;
        setData(merged);
        save(merged);
        if(merged.theme?.key){applyTheme(merged.theme.key);setThemeState(merged.theme);}
        setSyncStatus('synced');
      });
      return unsub;
    };
    let unsub;
    if(window._fbReady){init().then(u=>{unsub=u;});}
    else{window.addEventListener('fbReady',()=>{init().then(u=>{unsub=u;});},{once:true});}
    return()=>{if(typeof unsub==='function')unsub();};
  },[]);

  // ── Save to localStorage + Firebase ──
  useEffect(()=>{
    if(isRemoteUpdate.current){isRemoteUpdate.current=false;return;}
    setSaved(false);
    setSyncStatus('syncing');
    const t=setTimeout(async()=>{
      save(data); // always save local
      if(window._fb){
        lastSaveTs.current=Date.now();
        const ok=await window._fb.save(data);
        setSyncStatus(ok?'synced':'error');
      } else {
        setSyncStatus('local');
      }
      setSaved(true);
    },800);
    return()=>clearTimeout(t);
  },[data]);

  const upd=useCallback((key,val,logMsg)=>{
    setData(prev=>{
      const next={...prev,[key]:val};
      if(logMsg){
        const author=prev.profiles?.p1?.name||prev.profiles?.p2?.name||'Sistema';
        const entry={id:uid(),timestamp:new Date().toISOString(),description:logMsg,author};
        next.changes=[...(prev.changes||[]),entry].slice(-200);
      }
      return next;
    });
  },[]);

  const logo=data.branding?.logo;
  const academyName=data.config?.academyName||'Academia Digital';

  useEffect(()=>{
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  },[]);

  const NAV=[
    {id:'dashboard',icon:'🏠',label:'Dashboard'},
    {id:'modules',icon:'📚',label:'Módulos'},
    {id:'parrilla',icon:'📱',label:'Parrilla'},
    {id:'temporizador',icon:'⏳',label:'Timer'},
    {id:'finanzas',icon:'💰',label:'Finanzas'},
    {id:'ideas',icon:'💡',label:'Ideas'},
    {id:'cambios',icon:'📋',label:'Cambios'},
    {id:'branding',icon:'🎨',label:'Branding'},
    {id:'ajustes',icon:'⚙️',label:'Ajustes'},
  ];

  const VIEWS={
    dashboard:<DashboardView data={data} upd={upd}/>,
    modules:<ModulesView data={data} upd={upd}/>,
    parrilla:<ParrillaView data={data} upd={upd}/>,
    temporizador:<TemporizadorView data={data} upd={upd}/>,
    finanzas:<FinanzasView data={data} upd={upd}/>,
    ideas:<IdeasView data={data} upd={upd}/>,
    cambios:<CambiosView data={data}/>,
    branding:<BrandingView data={data} upd={upd}/>,
    ajustes:<AjustesView data={data} upd={upd} setThemeState={setThemeState}/>,
  };

  return(
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-img">
            {logo?<img src={logo} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:8}} alt="logo"/>:'🎓'}
          </div>
          <div className="sidebar-logo-text">
            <h1>{academyName}</h1>
            <p>{data.config?.projectStatus||'EN CONSTRUCCIÓN'}</p>
          </div>
        </div>
        <div className="sidebar-nav">
          {NAV.map(n=>(
            <div key={n.id} className={`nav-item ${view===n.id?'active':''}`} onClick={()=>setView(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              <span>{n.label}</span>
            </div>
          ))}
        </div>
        <div className="sidebar-footer">
          <div className={`save-indicator ${syncStatus==='synced'?'save-ok':syncStatus==='error'?'save-pending':'save-pending'}`}>
            {syncStatus==='synced'?'☁️ Sincronizado':syncStatus==='syncing'?'⟳ Sincronizando...':syncStatus==='error'?'⚠️ Error sync':'💾 Local'}
          </div>
          <button className="btn-export" onClick={()=>{
            const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
            const a=document.createElement('a');a.href=URL.createObjectURL(blob);
            a.download='academia_backup.json';a.click();
          }}>📥 Exportar datos</button>
        </div>
      </div>
      <div className="main">
        <div className="mobile-header">
          <div className="mobile-header-title">
            <div className="mobile-header-logo">
              {logo?<img src={logo} style={{width:'100%',height:'100%',objectFit:'cover'}} alt="logo"/>:'🎓'}
            </div>
            <span>{academyName}</span>
          </div>
          <div className={`save-indicator ${syncStatus==='synced'?'save-ok':'save-pending'}`} style={{margin:0,padding:'4px 8px'}}>
            {syncStatus==='synced'?'☁️':syncStatus==='syncing'?'⟳':'⚠'}
          </div>
        </div>
        {VIEWS[view]||VIEWS.dashboard}
      </div>
      <div className="mobile-bottom-nav">
        <div className="mobile-bottom-nav-inner">
          {NAV.map(n=>(
            <div key={n.id} className={`mobile-nav-item ${view===n.id?'active':''}`} onClick={()=>setView(n.id)}>
              <span className="mobile-nav-icon">{n.icon}</span>
              <span className="mobile-nav-label">{n.label}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
